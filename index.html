<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JavaScript Mini Demo</title>
    <!-- styling -->
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>JavaScript Mini Demo</h1>

    <!-- ========================= -->
    <!-- Part 1: Date Display -->
    <!-- ========================= -->
    <section>
        <h2>Date Display</h2>
        <div id="dateOutput">
            Date will appear here
        </div>
    </section>

    <!-- ========================= -->
    <!-- Part 2: Number Conversion -->
    <!-- ========================= -->
    <section>
        <h2>Number Conversion Tests</h2>
        <div id="numberConversionOutput">
            Results will appear here
        </div>
    </section>

    <!-- ========================= -->
    <!-- Part 3: Math Formatting -->
    <!-- ========================= -->
    <section>
        <h2>Assignment Grade Calculator</h2>

        <p>Enter an assignment score and add it to the list.</p>

        <!-- User input -->
        <input type="number" id="scoreInput" placeholder="Enter score (0-100)">

        <button id="addScoreBtn">Add Assignment</button>
        <button id="clearScoresBtn">Clear All</button>

        <h3>Assignment Scores</h3>
        <div id="assignmentList">No assignments added yet.</div>

        <h3>Results</h3>
        <div id="mathOutput">Results will appear here</div>
    </section>

    <!-- External JavaScript file -->
    <script src="script.js"></script>
  </body>
</html>
